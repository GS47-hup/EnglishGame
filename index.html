<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - SpokenEnglish Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* Abstract background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #304587;
            top: -100px;
            left: -100px;
        }
        .shape-2 {
            width: 300px;
            height: 300px;
            background: #ab374b;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .gateway-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            text-align: center;
        }

        .header-section {
            padding-bottom: 3rem;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .app-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            transition: transform 0.4s ease;
        }

        .app-card:hover .icon-wrapper {
            transform: scale(1.1);
        }

        .app-flipbook .icon-wrapper {
            background: linear-gradient(135deg, #304587 0%, #1e2b54 100%);
            box-shadow: 0 10px 20px rgba(48, 69, 135, 0.3);
        }

        .app-exam .icon-wrapper {
            background: linear-gradient(135deg, #ab374b 0%, #7a2735 100%);
            box-shadow: 0 10px 20px rgba(171, 55, 75, 0.3);
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .app-desc {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 300;
            line-height: 1.5;
        }
        
        .security-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }

    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="gateway-container">
        <div class="header-section fade-in">
            <h1 class="text-5xl md:text-6xl font-black mb-4 tracking-tight">SpokenEnglish<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-red-400">Academy</span></h1>
            <p class="text-xl text-slate-400 font-light">Select your destination gateway below</p>
        </div>

        <div class="app-grid">
            <!-- App 1: Flipbooks -->
            <a href="flipbook-portal.html" class="app-card app-flipbook fade-in" style="animation-delay: 0.1s;">
                <div class="security-badge"><i class="fas fa-lock text-xs"></i> Protected</div>
                <div class="icon-wrapper">
                    <i class="fas fa-book-open"></i>
                </div>
                <h2 class="app-title">Course Material</h2>
                <p class="app-desc">Access interactive flipbooks, student books, workbooks, and teacher guides.</p>
            </a>

            <!-- App 2: Exams -->
            <a href="student-exam-selection.html" class="app-card app-exam fade-in" style="animation-delay: 0.2s;">
                <div class="security-badge"><i class="fas fa-lock text-xs"></i> Protected</div>
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2 class="app-title">Online Exams</h2>
                <p class="app-desc">Enter the secure remote examination portal for students of all levels.</p>
            </a>
        </div>
        
        <div class="mt-16 pt-8 border-t border-white/5 fade-in" style="animation-delay: 0.3s;">
            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">YouLearnt Education Systems</p>
        </div>
    </div>

    <style>
        .fade-in {
            opacity: 0;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
