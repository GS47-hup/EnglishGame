<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE Academy - Content Access</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .input-bubble:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30,
            50,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
    <script>
        // INSTANT REDIRECT if already logged in
        if (sessionStorage.getItem('flipbook_access') === 'granted') {
            window.location.href = 'final result/index.html';
        }
    </script>
</head>

<body class="p-4">
    <div class="glass-card w-full max-w-md p-8 md:p-12 text-center text-white">
        <div class="mb-8">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg">
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">Academy Portal</h1>
            <p class="text-slate-400">Please enter your supervisor password to access the content.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="relative">
                <input type="password" id="password" required
                    class="input-bubble w-full px-5 py-4 rounded-xl text-center text-xl tracking-widest placeholder-slate-500"
                    placeholder="••••••••">
                <div id="errorMsg" class="hidden mt-3 text-red-400 text-sm font-medium">
                    <i class="fas fa-exclamation-circle mr-1"></i> Invalid password.
                </div>
            </div>

            <button type="submit" class="btn-gradient w-full py-4 rounded-xl font-bold text-lg shadow-lg">
                Enter Portal <i class="fas fa-arrow-right ml-2 text-sm opacity-50"></i>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5">
            <p class="text-xs text-slate-500 uppercase tracking-widest">SpokenEnglish Academy</p>
        </div>
    </div>

    <script>
        const VALID_PASSWORD = "Academy2026";

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const passInput = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const card = document.querySelector('.glass-card');

            if (passInput.value === VALID_PASSWORD) {
                sessionStorage.setItem('flipbook_access', 'granted');
                window.location.href = 'final result/index.html';
            } else {
                passInput.value = '';
                errorMsg.classList.remove('hidden');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        });
    </script>
</body>

</html>
